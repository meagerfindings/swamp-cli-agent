manifestVersion: 1
name: "@mgreten/cli-agent"
version: "2026.07.21.2"
description: >
  Invoke CLI coding agents (claude, opencode, amp, gemini, codex, grok) with
  typed inputs and capture structured outputs — tokens, cost, duration,
  retries, and exit code. Supports slash command resolution and JSON response
  parsing.

repository: https://github.com/meagerfindings/swamp-cli-agent

models:
  - cli_agent.ts

additionalFiles:
  - README.md
  - LICENSE.txt

binaries:
  - cli_agent.sandbox.sb
  - cli_agent.sandbox.strict.sb

platforms: []
